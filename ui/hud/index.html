<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; }
    #hud {
      width: 600px; height: 72px;
      display: flex; align-items: center;
      border-radius: 0 0 16px 16px;
      background: rgba(10, 8, 20, 0.88);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(124, 58, 237, 0.35);
      border-top: none;
      opacity: 0;
      transform: translateY(-72px);
      transition: opacity 0.25s ease, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      padding: 0 20px; gap: 12px;
    }
    #hud.visible { opacity: 1; transform: translateY(0); }
    #bar { width: 3px; height: 36px; background: #7C3AED; border-radius: 2px; flex-shrink: 0; }
    #dots { display: none; gap: 5px; align-items: center; }
    #dots.active { display: flex; }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #7C3AED;
      animation: pulse 1.4s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.15s; }
    .dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes pulse {
      0%,100% { opacity: 0.25; transform: scale(0.75); }
      50% { opacity: 1; transform: scale(1.15); }
    }
    #label {
      color: #6b5b8e; font-size: 11px;
      text-transform: uppercase; letter-spacing: 0.08em;
      display: none; margin-left: 2px;
    }
    #label.active { display: block; }
    #text {
      color: #ede9f8; font-size: 13px;
      white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; max-width: 500px;
      display: none;
    }
    #text.active { display: block; }
  </style>
</head>
<body>
  <div id="hud">
    <div id="bar"></div>
    <div id="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <div id="label">Thinking</div>
    <div id="text"></div>
  </div>
  <script>
    const hud = document.getElementById('hud');
    const dots = document.getElementById('dots');
    const label = document.getElementById('label');
    const text = document.getElementById('text');
    let hideTimer = null;

    function showThinking() {
      clearTimeout(hideTimer);
      dots.classList.add('active');
      label.classList.add('active');
      text.classList.remove('active');
      hud.classList.add('visible');
      hideTimer = setTimeout(hide, 30000);
    }

    function showResponse(msg) {
      clearTimeout(hideTimer);
      dots.classList.remove('active');
      label.classList.remove('active');
      text.textContent = msg.replace(/\x1b\[[0-9;]*m/g, '').slice(0, 120);
      text.classList.add('active');
      hud.classList.add('visible');
      hideTimer = setTimeout(hide, 4000);
    }

    function hide() {
      hud.classList.remove('visible');
    }

    function connect() {
      const ws = new WebSocket('ws://127.0.0.1:8001/ws');
      ws.onopen = () => ws.send(JSON.stringify({register: 'hud'}));
      ws.onmessage = (e) => {
        try {
          const d = JSON.parse(e.data);
          if (d.type === 'ack' || d.type === 'status') showThinking();
          else if (d.type === 'final' && d.msg) showResponse(d.msg);
        } catch(err) {}
      };
      ws.onclose = () => setTimeout(connect, 3000);
      ws.onerror = () => setTimeout(connect, 3000);
    }

    connect();
  </script>
</body>
</html>
