<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: transparent;
      width: 56px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #dot {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #7C3AED;
      opacity: 0.35;
      transition: all 0.3s ease;
      box-shadow: 0 0 0 0 rgba(124, 58, 237, 0);
    }

    @keyframes breathe {

      0%,
      100% {
        transform: scale(1);
        opacity: 0.35;
      }

      50% {
        transform: scale(1.08);
        opacity: 0.45;
      }
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(124, 58, 237, 0.7);
      }

      50% {
        transform: scale(1.15);
        box-shadow: 0 0 0 8px rgba(124, 58, 237, 0);
      }
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .idle {
      animation: breathe 3s ease-in-out infinite;
    }

    .listening {
      opacity: 1 !important;
      animation: pulse 0.6s ease-in-out infinite;
    }

    .thinking {
      opacity: 0.8 !important;
      border: 2px solid #7C3AED;
      background: transparent !important;
      animation: spin 1s linear infinite;
    }

    .done {
      background: #22c55e !important;
      opacity: 1 !important;
    }

    .error {
      background: #ef4444 !important;
      opacity: 1 !important;
    }
  </style>
</head>

<body>
  <div id="dot" style="display:none"></div>
  <script>
    const dot = document.getElementById('dot');

    function setState(s) {
      dot.classList.remove('idle', 'listening', 'thinking', 'done', 'error');
      dot.classList.add(s);
    }

    setState('idle');

    function connect() {
      const ws = new WebSocket('ws://127.0.0.1:8001/ws');
      ws.onopen = () => ws.send(JSON.stringify({ register: 'hud' }));
      ws.onmessage = (e) => {
        try {
          const data = JSON.parse(e.data);
          if (data.source !== undefined && data.source !== 'voice') return;
          if (data.type === 'ack') {
            setState('listening');
          } else if (data.type === 'status') {
            setState('thinking');
          } else if (data.type === 'final') {
            setState('done');
            setTimeout(() => setState('idle'), 1500);
          } else if (data.type === 'error') {
            setState('error');
            setTimeout(() => setState('idle'), 1000);
          }
        } catch (err) {}
      };
      ws.onclose = () => setTimeout(connect, 3000);
      ws.onerror = () => setTimeout(connect, 3000);
    }

    connect();
  </script>
</body>

</html>
