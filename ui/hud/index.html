<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; }
    #hud {
      width: 600px; height: 80px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 0 0 16px 16px;
      background: rgba(15, 10, 30, 0.92);
      border: 1px solid rgba(124, 58, 237, 0.4);
      border-top: none;
      opacity: 0;
      transform: translateY(-80px);
      transition: opacity 0.3s ease, transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      padding: 0 24px; gap: 14px;
    }
    #hud.visible { opacity: 1; transform: translateY(0); }
    #dots { display: none; gap: 6px; }
    #dots.active { display: flex; }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #7C3AED;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%,100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }
    #text {
      color: #f0eaff; font-size: 13px;
      white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; max-width: 520px;
      display: none;
    }
    #text.active { display: block; }
  </style>
</head>
<body>
  <div id="hud">
    <div id="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <div id="text"></div>
  </div>
  <script>
    const hud = document.getElementById('hud');
    const dots = document.getElementById('dots');
    const text = document.getElementById('text');
    let hideTimer = null;

    function showThinking() {
      clearTimeout(hideTimer);
      dots.classList.add('active');
      text.classList.remove('active');
      hud.classList.add('visible');
      hideTimer = setTimeout(hide, 30000);
    }

    function showResponse(msg) {
      clearTimeout(hideTimer);
      dots.classList.remove('active');
      text.textContent = msg.slice(0, 120);
      text.classList.add('active');
      hud.classList.add('visible');
      hideTimer = setTimeout(hide, 4000);
    }

    function hide() {
      hud.classList.remove('visible');
    }

    function connect() {
      const ws = new WebSocket('ws://127.0.0.1:8001/ws');
      ws.onopen = () => ws.send(JSON.stringify({register: 'hud'}));
      ws.onmessage = (e) => {
        try {
          const d = JSON.parse(e.data);
          if (d.type === 'ack' || d.type === 'status') showThinking();
          else if (d.type === 'final' && d.msg) showResponse(d.msg);
        } catch(err) {}
      };
      ws.onclose = () => setTimeout(connect, 3000);
      ws.onerror = () => setTimeout(connect, 3000);
    }

    connect();
  </script>
</body>
</html>
