<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS Mission Control</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;400;700&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --bg-color: #f8f9fa;
            --panel-bg: rgba(255, 255, 255, 0.85);
            --border-color: rgba(0,0,0,0.1);
            --text-main: #212529;
            --text-user: #e67e22;
            --text-jarvis: #d35400;
            --text-sys: #95a5a6;
        }

        body.totality {
            --bg-color: #05010a;
            --panel-bg: rgba(10, 2, 20, 0.85);
            --border-color: #3c096c;
            --text-main: #e0aaff;
            --text-user: #c77dff;
            --text-jarvis: #ffffff;
            --text-sys: #7b2cbf;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main);
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden;
            display: flex;
            height: 100vh;
            transition: background-color 0.8s ease-in-out;
            background-image: linear-gradient(rgba(157, 78, 221, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(157, 78, 221, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* --- LEFT PANEL --- */
        .log-container { 
            width: 450px; background: var(--panel-bg); border-right: 1px solid var(--border-color); 
            padding: 20px; display: flex; flex-direction: column; backdrop-filter: blur(15px);
            transition: all 0.8s ease-in-out; z-index: 10;
        }
        .header { font-size: 0.9rem; letter-spacing: 2px; color: var(--text-user); border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-bottom: 20px; font-weight: bold; transition: all 0.8s ease;}
        #terminal { flex: 1; overflow-y: auto; font-size: 0.85rem; line-height: 1.6; padding-right: 10px; margin-bottom: 15px; }
        
        .chat-box { display: flex; align-items: center; border-top: 1px solid var(--border-color); padding-top: 15px; transition: all 0.8s ease; }
        .chat-box::before { content: ">"; color: var(--text-user); margin-right: 10px; font-weight: bold; }
        #chat-input { flex: 1; background: transparent; border: none; color: var(--text-main); font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; outline: none; }
        
        .log-entry { margin-bottom: 12px; opacity: 0; animation: fadeIn 0.3s forwards; }
        .log-time { color: var(--text-sys); margin-right: 10px; font-size: 0.75rem; }
        .log-user { color: var(--text-user); }
        .log-jarvis { color: var(--text-jarvis); font-weight: bold; }
        body.totality .log-jarvis { text-shadow: 0 0 10px rgba(199, 125, 255, 0.8); font-weight: normal; }
        .log-system { color: var(--text-sys); font-style: italic; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--text-sys); border-radius: 4px; }

        /* --- THE ECLIPSE ENGINE (Pure CSS) --- */
        .core-container { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; }
        
        .eclipse-wrapper { position: relative; width: 260px; height: 260px; }

        /* The Corona (Sits Behind the Sun, invisible until totality) */
        .corona {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%; opacity: 0; z-index: 1;
            background: radial-gradient(circle, #fff 0%, #e0aaff 40%, #5a189a 80%, transparent 100%);
            transition: opacity 1s ease, box-shadow 0.2s ease;
        }

        /* The Burning Sun (Clips the moon so it's invisible outside) */
        .sun-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%; z-index: 5;
            background: radial-gradient(circle at 30% 30%, #ffffff 0%, #ffeb3b 20%, #ff9800 60%, #e65100 100%);
            box-shadow: 0 0 60px #ff9800, inset -10px -10px 20px #b33600;
            overflow: hidden; /* THE SECRET: Moon is trapped inside here */
            transition: background 0.5s ease, box-shadow 0.5s ease;
        }

        /* The Black Moon */
        .moon {
            position: absolute; top: 0; left: -110%; width: 100%; height: 100%;
            border-radius: 50%; background: #010005;
            box-shadow: inset -15px -15px 30px rgba(255,255,255,0.1);
            animation: slideIn 7.5s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
        }

        /* Totality Triggers */
        body.totality .sun-container { background: transparent; box-shadow: none; }
        body.totality .corona {
            opacity: 1;
            box-shadow: 0 0 50px #fff, 0 0 100px #c77dff, 0 0 200px #5a189a;
            animation: breathe 4s infinite alternate ease-in-out;
        }
        body.totality .corona.active { 
            box-shadow: 0 0 80px #fff, 0 0 150px #e0aaff, 0 0 300px rgba(199, 125, 255, 0.8);
            transform: scale(1.05);
        }

        @keyframes slideIn { 100% { left: 0%; } }
        @keyframes breathe { 0% { transform: scale(1); } 100% { transform: scale(1.02); } }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } from { opacity: 0; transform: translateY(5px); } }
    </style>
</head>
<body>
    <div class="log-container">
        <div class="header">
            <div>JARVIS // NEURAL LINK</div>
            <div style="font-size: 0.65rem; margin-top: 6px;" id="status">STATUS: DISCONNECTED</div>
        </div>
        <div id="terminal"></div>
        <div class="chat-box">
            <input type="text" id="chat-input" placeholder="Type a command for JARVIS..." autocomplete="off" spellcheck="false">
        </div>
    </div>

    <div class="core-container">
        <div class="eclipse-wrapper">
            <div class="corona" id="core-corona"></div>
            <div class="sun-container">
                <div class="moon"></div>
            </div>
        </div>
    </div>

    <script>
        const terminal = document.getElementById('terminal');
        const corona = document.getElementById('core-corona');
        const statusText = document.getElementById('status');
        const chatInput = document.getElementById('chat-input');
        let socket;
        
        // Triggers the dark theme exactly when the moon locks into place
        setTimeout(() => {
            document.body.classList.add('totality');
            appendLog("Totality Achieved. Dark Energy Core online.", "log-system");
            if(statusText.innerText.includes("ONLINE")) statusText.style.color = "#c77dff";
        }, 7500); 

        function appendLog(text, type) {
            const div = document.createElement('div');
            div.className = 'log-entry ' + type;
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0') + ':' + now.getSeconds().toString().padStart(2, '0');
            div.innerHTML = `<span class="log-time">[${timeStr}]</span> ${text}`;
            terminal.appendChild(div);
            terminal.scrollTop = terminal.scrollHeight;
        }

        function connectWebSocket() {
            socket = new WebSocket('ws://127.0.0.1:8001/ws');
            socket.onopen = () => {
                statusText.innerText = "STATUS: ONLINE & LINKED";
                statusText.style.color = document.body.classList.contains('totality') ? "#c77dff" : "#d35400";
                appendLog("Neural Link Established.", "log-system");
            };
            socket.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    
                    // Triggers the voice pulse
                    corona.classList.add('active');
                    setTimeout(() => corona.classList.remove('active'), 250);
                    
                    let cleanMsg = data.msg.replace(/\u001b\[\d+m/g, '');
                    if (data.type === "prompt") appendLog(`USER: ${cleanMsg}`, "log-user");
                    else if (data.type === "final") appendLog(`JARVIS: ${cleanMsg}`, "log-jarvis");
                    else if (data.type === "status") appendLog(cleanMsg, "log-system");
                } catch (e) {}
            };
            socket.onclose = () => {
                statusText.innerText = "STATUS: DISCONNECTED";
                statusText.style.color = "#ff0033";
                setTimeout(connectWebSocket, 2000);
            };
        }

        chatInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && this.value.trim() !== '') {
                const command = this.value.trim();
                appendLog(`USER: ${command}`, "log-user");
                if (socket && socket.readyState === WebSocket.OPEN) {
                    socket.send(JSON.stringify({ type: "prompt", msg: command }));
                }
                this.value = '';
            }
        });

        connectWebSocket();
    </script>
</body>
</html>
